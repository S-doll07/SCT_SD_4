<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕸️ Web Scraper Pro - Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========================================
           ANIMATED BACKGROUND
           ======================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
            background: #0a0a0a;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #1a0a1a, #2d1b2e, #1a0a1a);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* ===== Floating Shapes ===== */
        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: floatShape 20s infinite ease-in-out;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            top: -50px;
            right: -50px;
            background: radial-gradient(circle, #d63384, #6f42c1);
            animation-delay: 0s;
            animation-duration: 25s;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            bottom: 100px;
            left: -50px;
            background: radial-gradient(circle, #6f42c1, #d63384);
            animation-delay: 5s;
            animation-duration: 20s;
        }

        .shape-3 {
            width: 150px;
            height: 150px;
            top: 50%;
            left: 50%;
            background: radial-gradient(circle, #d63384, #ff6b9d);
            animation-delay: 10s;
            animation-duration: 18s;
            opacity: 0.08;
        }

        .shape-4 {
            width: 250px;
            height: 250px;
            bottom: -80px;
            right: 100px;
            background: radial-gradient(circle, #7c3aed, #d63384);
            animation-delay: 3s;
            animation-duration: 22s;
        }

        .shape-5 {
            width: 100px;
            height: 100px;
            top: 20%;
            left: 10%;
            background: radial-gradient(circle, #ff6b9d, #d63384);
            animation-delay: 8s;
            animation-duration: 15s;
            opacity: 0.1;
        }

        @keyframes floatShape {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
            25% { transform: translate(50px, -30px) scale(1.1) rotate(90deg); }
            50% { transform: translate(-30px, 50px) scale(0.9) rotate(180deg); }
            75% { transform: translate(30px, -50px) scale(1.05) rotate(270deg); }
        }

        /* ===== Login Container ===== */
        .register-container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 35px;
            max-width: 450px;
            width: 100%;
            animation: fadeInUp 0.8s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 0 40px rgba(214, 51, 132, 0.1);
        }

        .register-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 26px;
            background: linear-gradient(135deg, #d63384, #6f42c1, #d63384);
            background-size: 300% 300%;
            animation: borderGlow 4s ease infinite;
            z-index: -1;
            opacity: 0.3;
        }

        @keyframes borderGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header .icon {
            font-size: 50px;
            margin-bottom: 10px;
            display: block;
            animation: pulseIcon 3s ease-in-out infinite;
        }

        @keyframes pulseIcon {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        .register-header h1 {
            font-size: 26px;
            color: #ffffff;
            font-weight: 700;
            text-shadow: 0 2px 20px rgba(214, 51, 132, 0.3);
            letter-spacing: 1px;
        }

        .register-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-top: 5px;
            letter-spacing: 0.5px;
        }

        .register-header .version {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ===== Form ===== */
        .form-group {
            margin-bottom: 16px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .form-group label i {
            margin-right: 8px;
            color: #d63384;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.4s ease;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input:focus {
            outline: none;
            border-color: #d63384;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 30px rgba(214, 51, 132, 0.15), inset 0 0 20px rgba(214, 51, 132, 0.05);
            transform: scale(1.01);
        }

        .password-strength {
            margin-top: 5px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .password-strength .bar {
            height: 100%;
            width: 0%;
            transition: all 0.5s ease;
            border-radius: 2px;
        }

        .password-strength .bar.weak { width: 33%; background: #dc3545; }
        .password-strength .bar.medium { width: 66%; background: #ffc107; }
        .password-strength .bar.strong { width: 100%; background: #28a745; }

        .password-hint {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: white;
            background: linear-gradient(135deg, #d63384, #6f42c1);
            background-size: 200% 200%;
            animation: btnGradient 3s ease infinite;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        @keyframes btnGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 40px rgba(214, 51, 132, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn i {
            font-size: 18px;
        }

        .login-link {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .login-link a {
            color: #d63384;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: #ff6b9d;
            text-shadow: 0 0 20px rgba(214, 51, 132, 0.3);
        }

        .register-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.5px;
        }

        /* ===== Toast ===== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.4s ease;
            min-width: 280px;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toast .toast-icon { font-size: 20px; }
        .toast.success { background: rgba(40, 167, 69, 0.9); }
        .toast.error { background: rgba(220, 53, 69, 0.9); }
        .toast.info { background: rgba(111, 66, 193, 0.9); }

        @keyframes slideIn {
            from { transform: translateX(100%) scale(0.8); opacity: 0; }
            to { transform: translateX(0) scale(1); opacity: 1; }
        }

        /* ===== Responsive ===== */
        @media (max-width: 480px) {
            .register-container {
                padding: 25px 20px;
                margin: 10px;
            }
            .register-header .icon { font-size: 40px; }
            .register-header h1 { font-size: 22px; }
            .shape { display: none; }
            .toast { min-width: auto; width: 100%; }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-container"></div>
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
    </div>

    <!-- Register Container -->
    <div class="register-container">
        <div class="register-header">
            <span class="icon">🕸️</span>
            <h1>Create Account</h1>
            <p>Join Web Scraper Pro today</p>
            <span class="version">v4.0</span>
        </div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" placeholder="Choose a username" required autofocus>
            </div>

            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Create a password" required oninput="checkPasswordStrength(this.value)">
                <div class="password-strength">
                    <div class="bar" id="passwordBar"></div>
                </div>
                <div class="password-hint" id="passwordHint">
                    Min 6 chars, 1 uppercase, 1 lowercase, 1 number
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-check-circle"></i> Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            </div>

            <button type="submit" class="btn" id="registerBtn">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>

        <div class="login-link">
            Already have an account? <a href="/login">Sign In</a>
        </div>

        <div class="register-footer">
            <p>© 2026 Web Scraper Pro. All rights reserved.</p>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        function showToast(message, type) {
            type = type || 'info';
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast ' + type;
            var icons = {
                success: 'fas fa-check-circle',
                error: 'fas fa-exclamation-circle',
                info: 'fas fa-info-circle'
            };
            var iconClass = icons[type] || icons.info;
            toast.innerHTML = '<span class="toast-icon"><i class="' + iconClass + '"></i></span><span>' + message + '</span>';
            container.appendChild(toast);
            setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100px)';
                toast.style.transition = 'all 0.5s ease';
                setTimeout(function() {
                    toast.remove();
                }, 500);
            }, 4000);
        }

        function checkPasswordStrength(password) {
            var bar = document.getElementById('passwordBar');
            var hint = document.getElementById('passwordHint');
            
            var strength = 0;
            if (password.length >= 6) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            
            bar.className = 'bar';
            if (strength <= 1) {
                bar.classList.add('weak');
                hint.textContent = '⚠️ Weak password';
                hint.style.color = '#dc3545';
            } else if (strength <= 3) {
                bar.classList.add('medium');
                hint.textContent = '⚡ Medium password';
                hint.style.color = '#ffc107';
            } else {
                bar.classList.add('strong');
                hint.textContent = '✅ Strong password';
                hint.style.color = '#28a745';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();

            var username = document.getElementById('username').value.trim();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirmPassword').value;
            var btn = document.getElementById('registerBtn');

            if (!username || !email || !password || !confirmPassword) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';

            try {
                var response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        password: password,
                        confirm_password: confirmPassword
                    })
                });

                var data = await response.json();

                if (response.ok && data.status === 'success') {
                    showToast(data.message, 'success');
                    setTimeout(function() {
                        window.location.href = data.redirect || '/login';
                    }, 1500);
                } else {
                    showToast(data.message || 'Registration failed', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                }
            } catch (error) {
                showToast('Connection error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        }

        // Enter key support
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('registerForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
