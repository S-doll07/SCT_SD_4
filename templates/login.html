<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕸️ Web Scraper Pro - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========================================
           RESET & BASE
           ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
            background: #0a0a0a;
        }

        /* ========================================
           ANIMATED GRADIENT BACKGROUND
           ======================================== */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #1a0a1a, #2d1b2e, #1a0a1a);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* ========================================
           FLOATING SHAPES
           ======================================== */
        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: floatShape 20s infinite ease-in-out;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            top: -50px;
            right: -50px;
            background: radial-gradient(circle, #d63384, #6f42c1);
            animation-delay: 0s;
            animation-duration: 25s;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            bottom: 100px;
            left: -50px;
            background: radial-gradient(circle, #6f42c1, #d63384);
            animation-delay: 5s;
            animation-duration: 20s;
        }

        .shape-3 {
            width: 150px;
            height: 150px;
            top: 50%;
            left: 50%;
            background: radial-gradient(circle, #d63384, #ff6b9d);
            animation-delay: 10s;
            animation-duration: 18s;
            opacity: 0.08;
        }

        .shape-4 {
            width: 250px;
            height: 250px;
            bottom: -80px;
            right: 100px;
            background: radial-gradient(circle, #7c3aed, #d63384);
            animation-delay: 3s;
            animation-duration: 22s;
        }

        .shape-5 {
            width: 100px;
            height: 100px;
            top: 20%;
            left: 10%;
            background: radial-gradient(circle, #ff6b9d, #d63384);
            animation-delay: 8s;
            animation-duration: 15s;
            opacity: 0.1;
        }

        @keyframes floatShape {
            0%,
            100% {
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            25% {
                transform: translate(50px, -30px) scale(1.1) rotate(90deg);
            }
            50% {
                transform: translate(-30px, 50px) scale(0.9) rotate(180deg);
            }
            75% {
                transform: translate(30px, -50px) scale(1.05) rotate(270deg);
            }
        }

        /* ========================================
           FLOATING PARTICLES
           ======================================== */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #d63384;
            border-radius: 50%;
            opacity: 0.3;
            animation: floatParticle 10s infinite linear;
        }

        .particle:nth-child(1) {
            left: 10%;
            animation-duration: 12s;
            animation-delay: 0s;
        }
        .particle:nth-child(2) {
            left: 20%;
            animation-duration: 14s;
            animation-delay: 2s;
            width: 6px;
            height: 6px;
        }
        .particle:nth-child(3) {
            left: 30%;
            animation-duration: 10s;
            animation-delay: 4s;
        }
        .particle:nth-child(4) {
            left: 40%;
            animation-duration: 16s;
            animation-delay: 1s;
            width: 3px;
            height: 3px;
        }
        .particle:nth-child(5) {
            left: 50%;
            animation-duration: 11s;
            animation-delay: 3s;
        }
        .particle:nth-child(6) {
            left: 60%;
            animation-duration: 13s;
            animation-delay: 5s;
            width: 5px;
            height: 5px;
        }
        .particle:nth-child(7) {
            left: 70%;
            animation-duration: 15s;
            animation-delay: 2s;
        }
        .particle:nth-child(8) {
            left: 80%;
            animation-duration: 12s;
            animation-delay: 4s;
            width: 4px;
            height: 4px;
        }
        .particle:nth-child(9) {
            left: 90%;
            animation-duration: 14s;
            animation-delay: 1s;
        }
        .particle:nth-child(10) {
            left: 95%;
            animation-duration: 10s;
            animation-delay: 3s;
            width: 3px;
            height: 3px;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        /* ========================================
           LOGIN CONTAINER - GLASS MORPHISM
           ======================================== */
        .login-container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 450px;
            width: 100%;
            animation: fadeInUp 0.8s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 0 40px rgba(214, 51, 132, 0.1);
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 26px;
            background: linear-gradient(135deg, #d63384, #6f42c1, #d63384);
            background-size: 300% 300%;
            animation: borderGlow 4s ease infinite;
            z-index: -1;
            opacity: 0.3;
        }

        @keyframes borderGlow {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ========================================
           LOGIN HEADER
           ======================================== */
        .login-header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        .login-header .icon {
            font-size: 60px;
            margin-bottom: 10px;
            display: block;
            animation: pulseIcon 3s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        @keyframes pulseIcon {
            0%,
            100% {
                transform: scale(1) rotate(0deg);
            }
            50% {
                transform: scale(1.1) rotate(5deg);
            }
        }

        .login-header .icon-wrapper {
            display: inline-block;
            position: relative;
        }

        .login-header .icon-wrapper::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(214, 51, 132, 0.3), transparent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0;
            }
        }

        .login-header h1 {
            font-size: 28px;
            color: #ffffff;
            font-weight: 700;
            text-shadow: 0 2px 20px rgba(214, 51, 132, 0.3);
            letter-spacing: 1px;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-top: 5px;
            letter-spacing: 0.5px;
        }

        .login-header .version {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ========================================
           FORM
           ======================================== */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .form-group label i {
            margin-right: 8px;
            color: #d63384;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.4s ease;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input:focus {
            outline: none;
            border-color: #d63384;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 30px rgba(214, 51, 132, 0.15), inset 0 0 20px rgba(214, 51, 132, 0.05);
            transform: scale(1.01);
        }

        /* ========================================
           DEMO CREDENTIALS
           ======================================== */
        .demo-credentials {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 14px 16px;
            margin: 15px 0 20px 0;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: all 0.3s ease;
        }

        .demo-credentials:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(214, 51, 132, 0.3);
        }

        .demo-credentials .demo-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.5px;
        }

        .demo-credentials .demo-creds {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            margin-top: 4px;
        }

        .demo-credentials .demo-creds span {
            background: rgba(214, 51, 132, 0.2);
            padding: 2px 12px;
            border-radius: 6px;
            margin: 0 4px;
            border: 1px solid rgba(214, 51, 132, 0.1);
        }

        .demo-credentials .demo-hint {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }

        /* ========================================
           BUTTONS
           ======================================== */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: white;
            background: linear-gradient(135deg, #d63384, #6f42c1);
            background-size: 200% 200%;
            animation: btnGradient 3s ease infinite;
            position: relative;
            overflow: hidden;
        }

        @keyframes btnGradient {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 40px rgba(214, 51, 132, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn i {
            font-size: 18px;
        }

        /* ========================================
           QUICK LOGIN BUTTON
           ======================================== */
        .login-shortcut {
            margin-top: 12px;
            text-align: center;
        }

        .login-shortcut .demo-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }

        .login-shortcut .demo-btn:hover {
            background: rgba(214, 51, 132, 0.2);
            border-color: #d63384;
            color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(214, 51, 132, 0.1);
        }

        /* ========================================
           FOOTER
           ======================================== */
        .login-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.5px;
        }

        .login-footer a {
            color: #d63384;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-footer a:hover {
            color: #ff6b9d;
            text-shadow: 0 0 20px rgba(214, 51, 132, 0.3);
        }

        /* ========================================
           TOAST
           ======================================== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.4s ease;
            min-width: 280px;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toast .toast-icon {
            font-size: 20px;
        }

        .toast.success {
            background: rgba(40, 167, 69, 0.9);
        }
        .toast.error {
            background: rgba(220, 53, 69, 0.9);
        }
        .toast.info {
            background: rgba(111, 66, 193, 0.9);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%) scale(0.8);
                opacity: 0;
            }
            to {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }

        /* ========================================
           RESPONSIVE
           ======================================== */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
                margin: 10px;
            }
            .login-header .icon {
                font-size: 40px;
            }
            .login-header h1 {
                font-size: 22px;
            }
            .shape {
                display: none;
            }
            .particle {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- ========================================
    ANIMATED BACKGROUND
    ======================================== -->
    <div class="bg-container"></div>

    <!-- Floating Shapes -->
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
    </div>

    <!-- Floating Particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- ========================================
    LOGIN CONTAINER
    ======================================== -->
    <div class="login-container">
        <div class="login-header">
            <div class="icon-wrapper">
                <span class="icon">🕸️</span>
            </div>
            <h1>Web Scraper Pro</h1>
            <p>Professional data extraction tool</p>
            <span class="version">v4.0</span>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" placeholder="Enter your username" required autofocus>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <div class="demo-credentials">
                <div class="demo-label">💡 Demo Credentials (use any)</div>
                <div class="demo-creds">
                    <span>demo</span> <span>demo123</span>
                </div>
                <div class="demo-hint">Or enter any username/password</div>
            </div>

            <div class="login-shortcut">
                <button type="button" class="demo-btn" onclick="quickLogin()">
                    <i class="fas fa-bolt"></i> Quick Login
                </button>
            </div>

            <button type="submit" class="btn" id="loginBtn" style="margin-top:15px;">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="login-footer">
            <p>© 2026 Web Scraper Pro. All rights reserved.</p>
        </div>
    </div>

    <!-- ========================================
    TOAST CONTAINER
    ======================================== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ========================================
    SCRIPTS
    ======================================== -->
    <script>
        function showToast(message, type) {
            type = type || 'info';
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast ' + type;
            var icons = {
                success: 'fas fa-check-circle',
                error: 'fas fa-exclamation-circle',
                info: 'fas fa-info-circle'
            };
            var iconClass = icons[type] || icons.info;
            toast.innerHTML = '<span class="toast-icon"><i class="' + iconClass + '"></i></span><span>' + message +
                '</span>';
            container.appendChild(toast);
            setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100px)';
                toast.style.transition = 'all 0.5s ease';
                setTimeout(function() {
                    toast.remove();
                }, 500);
            }, 4000);
        }

        function quickLogin() {
            document.getElementById('username').value = 'demo';
            document.getElementById('password').value = 'demo123';
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }

        async function handleLogin(e) {
            e.preventDefault();

            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value.trim();
            var btn = document.getElementById('loginBtn');

            if (!username || !password) {
                showToast('Please enter both username and password', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            try {
                var response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });

                var data = await response.json();

                if (response.ok && data.status === 'success') {
                    showToast(data.message, 'success');
                    setTimeout(function() {
                        window.location.href = data.redirect || '/';
                    }, 500);
                } else {
                    showToast(data.message || 'Login failed', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            } catch (error) {
                showToast('Connection error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        }

        // Enter key support
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
